[build]
builder = "DOCKERFILE"

[[services]]
name = "backend"
source = "backend"

[services.build]
dockerfilePath = "backend/Dockerfile"

[services.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "frontend"
source = "frontend"

[services.build]
dockerfilePath = "frontend/Dockerfile"

[services.deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30